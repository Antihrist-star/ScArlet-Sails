<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scarlet Sails Models</title>
    <style>
        :root {
            --color-primary: #0ea5e9;
            --color-secondary: #1e293b;
            --color-text: #e2e8f0;
            --color-border: #334155;
            --color-bg: #0f172a;
        }
        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            border-bottom: 2px solid var(--color-border);
            padding-bottom: 20px;
        }
        .header h1 {
            margin: 0;
            font-size: 32px;
            color: var(--color-primary);
        }
        .nav {
            display: flex;
            gap: 20px;
        }
        .nav a {
            color: var(--color-text);
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        .nav a:hover {
            background-color: var(--color-secondary);
            color: var(--color-primary);
        }
        .model-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .model-card {
            background-color: var(--color-secondary);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        .model-card:hover {
            border-color: var(--color-primary);
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.2);
        }
        .model-card h3 {
            margin: 0 0 10px 0;
            font-size: 20px;
            color: var(--color-primary);
        }
        .model-card p {
            margin: 8px 0;
            line-height: 1.6;
            opacity: 0.8;
        }
        .no-data {
            background-color: rgba(245, 158, 11, 0.1);
            border-left: 4px solid #f59e0b;
            padding: 15px;
            border-radius: 4px;
            color: var(--color-text);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Scarlet Sails Models</h1>
            <div class="nav">
                <a href="index.html">Home</a>
                <a href="dashboard.html">Dashboard</a>
                <a href="models.html" style="color: var(--color-primary);">Models</a>
                <a href="api.html">API</a>
            </div>
        </div>

        <div id="models-container" class="model-list">
            <div style="grid-column: 1 / -1;" class="no-data">
                <p>Loading model information from repository...</p>
            </div>
        </div>
    </div>

    <script src="data-service.js"></script>
    <script>
        async function loadModels() {
            try {
                const modelsContainer = document.getElementById('models-container');
                modelsContainer.innerHTML = '';

                const models = [
                    { name: 'P_rb', title: 'Range-Bound Strategy' },
                    { name: 'P_mi', title: 'Momentum Indicator Strategy' },
                    { name: 'P_hyb', title: 'Hybrid Strategy' }
                ];

                let modelsFound = 0;
                for (const model of models) {
                    try {
                        const code = await DataService.getModelCode(model.name);
                        if (code && !code.includes('(Model')) {
                            modelsFound++;
                            const desc = await DataService.getModelDescription(model.name);
                            const card = createModelCard(model.name, model.title, desc);
                            modelsContainer.appendChild(card);
                        }
                    } catch (e) {
                        console.log(`Model ${model.name} not found`);
                    }
                }

                if (modelsFound === 0) {
                    modelsContainer.innerHTML = '<div style="grid-column: 1 / -1;" class="no-data"><p>-- (No models found in repository)</p></div>';
                }
            } catch (error) {
                console.error('Error loading models:', error);
                document.getElementById('models-container').innerHTML = '<div style="grid-column: 1 / -1;" class="no-data"><p>Error loading models: ' + error.message + '</p></div>';
            }
        }

        function createModelCard(name, title, description) {
            const card = document.createElement('div');
            card.className = 'model-card';
            card.innerHTML = `
                <h3>${title}</h3>
                <p><strong>Model ID:</strong> ${name}</p>
                <p>${description || '-- (No description available)'}</p>
                <p style="font-size: 12px; color: #888; margin-top: 15px;">
                    Source: /models/${name}.py
                </p>
            `;
            return card;
        }

        document.addEventListener('DOMContentLoaded', loadModels);
    </script>
</body>
</html>
